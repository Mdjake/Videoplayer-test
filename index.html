<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>

  <script>
    // ====== LOCK window.open BEFORE ANYTHING LOADS ======
    (function() {
      const noop = function() { return null; };

      // Lock on this page
      Object.defineProperty(window, 'open', {
        value: noop,
        writable: false,
        configurable: false
      });

      // Block _blank / _top link clicks (capture phase = before ad scripts)
      document.addEventListener('click', function(e) {
        const a = e.target.closest('a');
        if (!a) return;
        const t = (a.target || '').toLowerCase();
        if (t === '_blank' || t === '_top' || t === '_parent') {
          e.preventDefault();
          e.stopImmediatePropagation();
          logBlock('link _blank blocked: ' + (a.href || '').substring(0, 60));
        }
      }, true);

      // Stop page from being navigated away
      window.addEventListener('beforeunload', function(e) {
        e.preventDefault();
        e.returnValue = '';
      });

    })();

    // ====== INJECT BLOCKER INTO IFRAME AFTER IT LOADS ======
    function nukeIframe(iframe) {
      try {
        const w = iframe.contentWindow;
        if (!w) return;

        // Override open in iframe window
        try {
          Object.defineProperty(w, 'open', {
            value: function() { logBlock('iframe window.open blocked'); return null; },
            writable: false,
            configurable: false
          });
        } catch(e) {}

        // Block _blank links inside iframe
        try {
          w.document.addEventListener('click', function(e) {
            const a = e.target.closest('a');
            if (!a) return;
            const t = (a.target || '').toLowerCase();
            if (t === '_blank' || t === '_top' || t === '_parent') {
              e.preventDefault();
              e.stopImmediatePropagation();
              logBlock('iframe link blocked');
            }
          }, true);
        } catch(e) {}

        // Recursively nuke nested iframes
        try {
          const nested = w.document.querySelectorAll('iframe');
          nested.forEach(nukeIframe);
        } catch(e) {}

        // Watch for new iframes added dynamically inside
        try {
          const obs = new w.MutationObserver(function(mutations) {
            mutations.forEach(function(m) {
              m.addedNodes.forEach(function(node) {
                if (node.tagName === 'IFRAME') nukeIframe(node);
              });
            });
          });
          obs.observe(w.document.body, { childList: true, subtree: true });
        } catch(e) {}

      } catch(err) {
        // Cross-origin — expected, can't inject
      }
    }

    function logBlock(msg) {
      const el = document.getElementById('log');
      if (!el) return;
      const s = document.createElement('span');
      s.textContent = '🚫 ' + msg + ' — ' + new Date().toLocaleTimeString();
      el.prepend(s);
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 14px;
      min-height: 100vh;
    }
    h1 { font-size: 1.3rem; color: #ddd; }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    input {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #fff;
      font-size: 0.9rem;
      width: 200px;
    }
    select {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #fff;
      font-size: 0.9rem;
    }
    button {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      background: #e50914;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #c4070f; }

    .player-wrap {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .log-box {
      width: 100%;
      max-width: 900px;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.72rem;
      color: #4caf50;
      max-height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
  </style>
</head>
<body>

  <h1>🎬 Player Test</h1>

  <div class="controls">
    <input type="text" id="movieId" placeholder="IMDB ID e.g. tt4832640" value="tt4832640" />
    <select id="source">
      <option value="vidsrc">vidsrc.me</option>
      <option value="2embed">2embed.to</option>
      <option value="vidlink">vidlink.pro</option>
      <option value="autoembed">autoembed.to</option>
    </select>
    <button onclick="loadPlayer()">Load</button>
  </div>

  <div class="player-wrap">
    <!-- NO sandbox — so sites load. Popup blocking done via JS above -->
    <iframe
      id="player"
      allowfullscreen
      allow="autoplay; fullscreen; encrypted-media"
      referrerpolicy="no-referrer"
    ></iframe>
  </div>

  <div class="log-box" id="log">
    <span style="color:#666">🛡️ Popup blocker active (no sandbox). Blocked attempts appear here.</span>
  </div>

  <script>
    const sources = {
      vidsrc:    id => `https://vidsrc.me/embed/movie?imdb=${id}`,
      '2embed':  id => `https://www.2embed.to/embed/imdb/${id}`,
      vidlink:   id => `https://vidlink.pro/movie/${id}`,
      autoembed: id => `https://autoembed.to/movie/imdb/${id}`
    };

    function loadPlayer() {
      const id = document.getElementById('movieId').value.trim();
      const source = document.getElementById('source').value;
      if (!id) return;

      const iframe = document.getElementById('player');
      iframe.src = '';
      setTimeout(() => {
        iframe.src = sources[source](id);
        iframe.onload = () => {
          nukeIframe(iframe);
          logBlock = function(msg) {
            const el = document.getElementById('log');
            if (!el) return;
            const s = document.createElement('span');
            s.textContent = '🚫 ' + msg + ' — ' + new Date().toLocaleTimeString();
            el.prepend(s);
          };
        };
      }, 50);
    }

    loadPlayer();
  </script>

</body>
</html>
