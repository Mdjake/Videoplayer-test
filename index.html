<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <script>
    Object.defineProperty(window, 'open', {
      value: function() { return null; },
      writable: false, configurable: false
    });
    window.addEventListener('beforeunload', e => { e.preventDefault(); e.returnValue = ''; });
  </script>

  <style>
    :root {
      --bg: #080808;
      --surface: #111;
      --border: #1e1e1e;
      --accent: #ff3c3c;
      --accent2: #ff7b3c;
      --text: #f0f0f0;
      --muted: #555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
      gap: 14px;
    }

    header {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      font-size: 0.65rem;
      background: #1a1a1a;
      border: 1px solid var(--border);
      color: #4caf50;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    .search-row {
      width: 100%;
      max-width: 900px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .search-row input {
      flex: 1;
      min-width: 150px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row select {
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .btn-load {
      padding: 10px 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn-load:active { transform: scale(0.97); }

    /* ── PLAYER ── */
    .player-container {
      width: 100%;
      max-width: 900px;
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
      box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.8);
    }

    iframe#player {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Overlay blocks all iframe clicks */
    #overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: transparent;
      cursor: default;
    }
    #overlay.unlocked { display: none; }

    /* Idle screen */
    #idle-screen {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.9);
      gap: 12px;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #idle-screen.hidden { opacity: 0; }

    /* Countdown badge inside player (top-right, out of the way) */
    #countdown-badge {
      position: absolute;
      top: 10px;
      right: 12px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,60,60,0.5);
      color: #fff;
      font-size: 0.72rem;
      padding: 5px 12px 5px 8px;
      border-radius: 30px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #countdown-badge.show { opacity: 1; pointer-events: auto; }

    #countdown-ring { width: 20px; height: 20px; position: relative; flex-shrink: 0; }
    #countdown-ring svg { transform: rotate(-90deg); width: 20px; height: 20px; }
    #countdown-ring circle { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 3; }
    #countdown-ring .progress { stroke: var(--accent); stroke-dasharray: 57; stroke-dashoffset: 0; }
    #countdown-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700; color: #fff;
    }

    #lock-btn {
      background: rgba(255,60,60,0.3);
      border: none; color: #fff;
      padding: 3px 8px; border-radius: 20px;
      font-size: 0.68rem; cursor: pointer;
    }
    #lock-btn:hover { background: rgba(255,60,60,0.6); }

    /* ── CONTROLS BAR — OUTSIDE PLAYER ── */
    .controls-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: #1a1a1a;
      border: 1px solid var(--border);
      color: #fff;
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: #222; border-color: #333; }
    .ctrl-btn svg { width: 16px; height: 16px; fill: #fff; flex-shrink: 0; }

    .unlock-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      font-weight: 500;
      font-size: 0.82rem;
      padding: 9px 18px;
    }
    .unlock-btn:hover { opacity: 0.9; background: linear-gradient(135deg, var(--accent), var(--accent2)); }

    .spacer { flex: 1; }

    .source-label {
      font-size: 0.68rem;
      color: var(--muted);
    }

    /* ── LOG ── */
    .log-box {
      width: 100%;
      max-width: 900px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.7rem;
      color: #4caf50;
      max-height: 80px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .log-box .muted { color: var(--muted); }

    /* ── FULLSCREEN: move overlay INSIDE fullscreen context ── */
    /* When fullscreen is active on the container, overlay must still work */
    :fullscreen #overlay,
    :-webkit-full-screen #overlay,
    :-moz-full-screen #overlay {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
    }

    :fullscreen #countdown-badge,
    :-webkit-full-screen #countdown-badge,
    :-moz-full-screen #countdown-badge {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 2147483647;
    }

    /* Fullscreen controls floating bar */
    #fs-controls {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2147483647;
      background: rgba(10,10,10,0.9);
      border: 1px solid #333;
      border-radius: 30px;
      padding: 8px 16px;
      gap: 10px;
      align-items: center;
    }

    :fullscreen #fs-controls,
    :-webkit-full-screen #fs-controls,
    :-moz-full-screen #fs-controls {
      display: flex;
    }

    .fs-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .fs-btn:hover { background: rgba(255,255,255,0.1); }
    .fs-btn svg { width: 16px; height: 16px; fill: #fff; }

    .fs-unlock-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px;
      padding: 6px 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">StreamVault</div>
    <div class="badge">🛡 AD SHIELD ON</div>
  </header>

  <div class="search-row">
    <input type="text" id="movieId" placeholder="IMDB ID — e.g. tt4832640" value="tt4832640" />
    <select id="source">
      <option value="vidsrc">vidsrc.me</option>
      <option value="2embed">2embed.to</option>
      <option value="vidlink">vidlink.pro</option>
      <option value="autoembed">autoembed.to</option>
    </select>
    <button class="btn-load" onclick="loadPlayer()">Load</button>
  </div>

  <!-- PLAYER -->
  <div class="player-container" id="playerContainer">

    <iframe
      id="player"
      allowfullscreen
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
      referrerpolicy="no-referrer"
    ></iframe>

    <!-- Overlay blocks iframe clicks -->
    <div id="overlay"></div>

    <!-- Idle -->
    <div id="idle-screen">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="#333"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      <div style="color:#444;font-size:0.8rem;letter-spacing:1px">LOAD A MOVIE TO BEGIN</div>
    </div>

    <!-- Countdown badge — top right corner, safe spot -->
    <div id="countdown-badge">
      <div id="countdown-ring">
        <svg viewBox="0 0 20 20">
          <circle cx="10" cy="10" r="9"/>
          <circle class="progress" id="ring-progress" cx="10" cy="10" r="9"/>
        </svg>
        <div id="countdown-num">5</div>
      </div>
      <span>Click player to interact</span>
      <button id="lock-btn" onclick="lockNow()">🔒 Lock</button>
    </div>

    <!-- Fullscreen floating controls (only visible in fullscreen) -->
    <div id="fs-controls">
      <button class="fs-btn fs-unlock-btn" onclick="unlockTemporarily(5)">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        Play / Unmute
      </button>
      <button class="fs-btn" onclick="reloadPlayer()">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Reload
      </button>
      <button class="fs-btn" onclick="document.exitFullscreen()">
        <svg viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
        Exit
      </button>
    </div>

  </div>

  <!-- CONTROLS BAR — OUTSIDE PLAYER, SAFE FROM ADS -->
  <div class="controls-bar">

    <button class="ctrl-btn unlock-btn" onclick="unlockTemporarily(5)">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      Play / Unmute (5s)
    </button>

    <button class="ctrl-btn" onclick="reloadPlayer()">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      Reload
    </button>

    <div class="spacer"></div>
    <span class="source-label" id="sourceLabel">No source loaded</span>

    <button class="ctrl-btn" onclick="goFullscreen()">
      <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      Fullscreen
    </button>

  </div>

  <div class="log-box" id="log">
    <span class="muted">🛡️ Overlay active — all iframe clicks blocked. Use controls above to interact.</span>
  </div>

  <script>
    const sources = {
      vidsrc:    id => `https://vidsrc.me/embed/movie?imdb=${id}`,
      '2embed':  id => `https://www.2embed.to/embed/imdb/${id}`,
      vidlink:   id => `https://vidlink.pro/movie/${id}`,
      autoembed: id => `https://autoembed.to/movie/imdb/${id}`
    };

    let loaded = false;
    let countdownInterval = null;
    const UNLOCK_SECS = 5;
    const CIRCUMFERENCE = 56.5; // 2 * pi * 9

    function loadPlayer() {
      const id = document.getElementById('movieId').value.trim();
      const source = document.getElementById('source').value;
      if (!id) return;

      const iframe = document.getElementById('player');
      iframe.src = sources[source](id);

      document.getElementById('idle-screen').classList.add('hidden');
      document.getElementById('sourceLabel').textContent = source + ' · ' + id;
      loaded = true;

      addLog('▶ Loaded: ' + sources[source](id));
    }

    function unlockTemporarily(secs) {
      if (!loaded) { loadPlayer(); return; }

      clearCountdown();

      const overlay = document.getElementById('overlay');
      const badge = document.getElementById('countdown-badge');

      overlay.classList.add('unlocked');
      badge.classList.add('show');

      addLog('🔓 Overlay lifted for ' + secs + 's — click player now');

      let remaining = secs;
      const numEl = document.getElementById('countdown-num');
      const ring = document.getElementById('ring-progress');

      numEl.textContent = remaining;
      ring.style.strokeDashoffset = 0;

      countdownInterval = setInterval(() => {
        remaining -= 0.05;
        const pct = 1 - (remaining / secs);
        ring.style.strokeDashoffset = CIRCUMFERENCE * pct;
        numEl.textContent = Math.ceil(remaining);
        if (remaining <= 0) lockNow();
      }, 50);
    }

    function lockNow() {
      clearCountdown();
      document.getElementById('overlay').classList.remove('unlocked');
      document.getElementById('countdown-badge').classList.remove('show');
      addLog('🔒 Re-locked — ads blocked');
    }

    function clearCountdown() {
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    }

    function reloadPlayer() {
      const iframe = document.getElementById('player');
      const src = iframe.src;
      iframe.src = '';
      setTimeout(() => { iframe.src = src; }, 80);
      lockNow();
      addLog('↺ Reloaded');
    }

    function goFullscreen() {
      // Fullscreen the container so our overlay + fs-controls go fullscreen too
      const container = document.getElementById('playerContainer');
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else if (container.requestFullscreen) {
        container.requestFullscreen();
      } else if (container.webkitRequestFullscreen) {
        container.webkitRequestFullscreen();
      } else if (container.mozRequestFullScreen) {
        container.mozRequestFullScreen();
      }
    }

    function addLog(msg) {
      const el = document.getElementById('log');
      const s = document.createElement('span');
      s.textContent = new Date().toLocaleTimeString() + ' · ' + msg;
      el.prepend(s);
    }
  </script>

</body>
</html>
